<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Stickio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="img/stickio-favicon.svg" type="image/svg+xml">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0A1628;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(138,149,168,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  input::placeholder { color: #5A6778; }
  button:active { transform: scale(0.98); }
  @keyframes scan {
    0%, 100% { top: 30px; }
    50% { top: calc(100% - 32px); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design system — load order matters -->
<script type="text/babel" src="components/animations.jsx"></script>
<script type="text/babel" src="components/tokens.jsx"></script>
<script type="text/babel" src="components/atoms.jsx"></script>
<script type="text/babel" src="components/mobile-1.jsx"></script>
<script type="text/babel" src="components/mobile-2.jsx"></script>
<script type="text/babel" src="components/desktop.jsx"></script>
<script type="text/babel" src="components/desktop-2.jsx"></script>

<script type="text/babel">
// Override Logo with the actual SVG asset (on-dark variant)
window.Logo = function Logo({ size = 28 }) {
  const h = size * 2;
  const w = Math.round(h * (400 / 120));
  return (
    <img
      src="img/stickio-logo-on-dark.svg"
      alt="Stickio"
      width={w}
      height={h}
      style={{ display: 'block', objectFit: 'contain' }}
    />
  );
};

const stats = { have: 247, total: 980, missing: 733, duplicates: 23 };

function App() {
  const [screen, setScreen] = React.useState('login');
  const [nav, setNav] = React.useState('home');
  const [userData, setUserData] = React.useState(null);

  const {
    LoginDesktop, RegisterDesktop, DashboardDesktop, AlbumDesktop,
    TradeDesktop, ProfileDesktop,
    DESKTOP_W, DESKTOP_H,
  } = window;

  const handleLogin = () => { setScreen('app'); setNav('home'); };
  const handleRegister = (data) => { setUserData(data); setScreen('app'); setNav('home'); };
  const handleNav = (id) => setNav(id);

  const ScaledAuth = ({ children }) => (
    <div style={{ width: '100vw', height: '100vh', background: window.SK.bg, overflow: 'hidden', position: 'relative' }}>
      <div style={{
        transform: `scale(${Math.min(window.innerWidth / DESKTOP_W, window.innerHeight / DESKTOP_H)})`,
        transformOrigin: 'top left',
        position: 'absolute', top: 0, left: 0,
      }}>{children}</div>
    </div>
  );

  if (screen === 'login')    return <ScaledAuth><LoginDesktop onLogin={handleLogin} onRegister={() => setScreen('register')}/></ScaledAuth>;
  if (screen === 'register') return <ScaledAuth><RegisterDesktop onRegister={handleRegister} onLogin={() => setScreen('login')}/></ScaledAuth>;

  const renderScreen = () => {
    switch (nav) {
      case 'home':    return <DashboardDesktop onNav={handleNav} stats={stats}/>;
      case 'album':   return <AlbumDesktop onNav={handleNav}/>;
      case 'trade':   return <TradeDesktop onNav={handleNav}/>;
      case 'profile': return <ProfileDesktop onNav={handleNav} stats={stats} userData={userData}/>;
      default:        return <DashboardDesktop onNav={handleNav} stats={stats}/>;
    }
  };

  return (
    <div style={{
      width: '100vw', height: '100vh',
      overflow: 'hidden',
      display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-start',
    }}>
      <ScaledDesktop width={DESKTOP_W} height={DESKTOP_H}>
        {renderScreen()}
      </ScaledDesktop>
    </div>
  );
}

function ScaledDesktop({ width, height, children }) {
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const update = () => {
      const scaleX = window.innerWidth / width;
      const scaleY = window.innerHeight / height;
      setScale(Math.min(scaleX, scaleY));
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [width, height]);

  return (
    <div style={{
      width: '100vw', height: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
        width, height,
        flexShrink: 0,
      }}>
        {children}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
