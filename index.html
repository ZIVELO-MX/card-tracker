function computeStats(collection) {
  const TOTAL = 992; // 20 FWC + 960 países (48×20) + 12 CC
  let have = 0, duplicates = 0;
  Object.values(collection).forEach(qty => {
    if (qty >= 1) have++;
    if (qty >= 2) duplicates++;
  });
  const countriesComplete = COUNTRIES.reduce((acc, c) => {
    const haveCount = Array.from({ length: 20 }, (_, i) =>
      (collection[`${c.code}${String(i + 1).padStart(2, '0')}`] || 0) > 0 ? 1 : 0
    ).reduce((a, b) => a + b, 0);
    return acc + (haveCount === c.total ? 1 : 0);
  }, 0);
  return { have, total: TOTAL, missing: TOTAL - have, duplicates, countriesComplete };
}

function computeAchievements(collection, stats) {
  const countryCompleteCount = COUNTRIES.reduce((acc, c) => {
    const haveCount = Array.from({ length: 20 }, (_, i) =>
      (collection[`${c.code}${String(i + 1).padStart(2, '0')}`] || 0) > 0 ? 1 : 0
    ).reduce((a, b) => a + b, 0);
    return acc + (haveCount === c.total ? 1 : 0);
  }, 0);

  const pct = stats.total ? stats.have / stats.total : 0;

  return [
    { id: 'first', label: 'Primera', desc: 'Estampa', unlocked: stats.have >= 1, icon: 'star' },
    { id: 'pct25', label: '25%', desc: 'Del album', unlocked: pct >= 0.25, icon: 'pct' },
    { id: 'pct50', label: '50%', desc: 'Del album', unlocked: pct >= 0.5, icon: 'pct' },
    { id: 'complete', label: '100%', desc: 'Completo', unlocked: pct >= 1, icon: 'trophy' },
    { id: 'dup5', label: '5', desc: 'Repetidas', unlocked: stats.duplicates >= 5, icon: 'swap' },
    { id: 'dup20', label: '20', desc: 'Repetidas', unlocked: stats.duplicates >= 20, icon: 'swap' },
    { id: 'country1', label: '1', desc: 'Pais completo', unlocked: countryCompleteCount >= 1, icon: 'star' },
    { id: 'country5', label: '5', desc: 'Paises completos', unlocked: countryCompleteCount >= 5, icon: 'star' },
  ];
}

function readActivityLog() {
  try {
    const raw = JSON.parse(localStorage.getItem('stickio_activity') || '[]');
    return Array.isArray(raw) ? raw.slice(0, 20) : [];
  } catch {
    return [];
  }
}

function logActivity(type, id = '') {
  try {
    const log = readActivityLog();
    log.unshift({ type, id, ts: Date.now() });
    localStorage.setItem('stickio_activity', JSON.stringify(log.slice(0, 20)));
    window.dispatchEvent(new Event('stickio:activity-updated'));
  } catch {}
}

function timeAgo(ts) {
  if (!ts) return 'Hace un momento';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)    return 'Hace un momento';
  if (s < 3600)  return `Hace ${Math.floor(s / 60)} min`;
  if (s < 86400) return `Hace ${Math.floor(s / 3600)} h`;
  return `Hace ${Math.floor(s / 86400)} d`;
}

function notificationsStorageKey(userId = null) {
  return userId ? `stickio_notifications_${userId}` : 'stickio_notifications_guest';
}

function setNotificationsUser(userId = null) {
  window.__notifications_user_id = userId || null;
}

function getNotificationsUser() {
  return window.__notifications_user_id || null;
}

function readNotifications(userId = getNotificationsUser()) {
  try {
    const raw = JSON.parse(localStorage.getItem(notificationsStorageKey(userId)) || '[]');
    return Array.isArray(raw) ? raw : [];
  } catch { return []; }
}

function pushNotification(type, text, userId = getNotificationsUser()) {
  try {
    const notifs = readNotifications(userId);
    if (notifs.find(n => n.type === type && Date.now() - n.ts < 300000)) return;
    notifs.unshift({ id: `${Date.now()}`, type, text, ts: Date.now(), read: false });
    localStorage.setItem(notificationsStorageKey(userId), JSON.stringify(notifs.slice(0, 50)));
    window.dispatchEvent(new Event('stickio:notification-added'));
  } catch {}
}

function markAllRead(userId = getNotificationsUser()) {
  try {
    const notifs = readNotifications(userId).map(n => ({ ...n, read: true }));
    localStorage.setItem(notificationsStorageKey(userId), JSON.stringify(notifs));
    window.dispatchEvent(new Event('stickio:notification-updated'));
  } catch {}
}

function getUnreadCount(userId = getNotificationsUser()) {
  return readNotifications(userId).filter(n => !n.read).length;
}

async function proposeTrade(fromUserId, toUserId, fromItems, toItems) {
  if (!window.supabase?.from) return { error: 'Sin conexión' };
  const { data, error } = await window.supabase.from('trade_offers').insert({
    from_user: fromUserId,
    to_user: toUserId,
    from_items: fromItems,
    to_items: toItems,
  }).select().single();
  if (!error) pushNotification('achievement', '¡Propuesta enviada! Espera la respuesta del coleccionista.');
  return { data, error };
}

async function respondToOffer(offerId, accept) {
  if (!window.supabase?.from) return { error: 'Sin conexión' };
  const status = accept ? 'accepted' : 'rejected';
  const { data, error } = await window.supabase.from('trade_offers')
    .update({ status, updated_at: new Date() })
    .eq('id', offerId)
    .select().single();
  if (!error && accept) pushNotification('achievement', '¡Intercambio aceptado! Ya pueden hacer el canje.');
  return { data, error };
}

async function cancelOffer(offerId) {
  if (!window.supabase?.from) return { error: 'Sin conexión' };
  return window.supabase.from('trade_offers')
    .update({ status: 'cancelled', updated_at: new Date() })
    .eq('id', offerId);
}

async function fetchTradeOffers(userId) {
  if (!window.supabase?.from || !userId) return [];
  const { data } = await window.supabase
    .from('trade_offers')
    .select('*, from_profile:from_user(username, display_name), to_profile:to_user(username, display_name)')
    .or(`from_user.eq.${userId},to_user.eq.${userId}`)
    .order('created_at', { ascending: false })
    .limit(50);
  return data || [];
}

async function fetchMarketplaceListings(userId = null) {
  if (!window.supabase?.from) return [];
  const { data: activeData, error: activeError } = await window.supabase
    .from('marketplace_listings')
    .select('*, profile:user_id(username, display_name, country_code, phone, whatsapp)')
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(100);

  if (activeError) throw activeError;

  if (!userId) return activeData || [];

  const { data: mineClosedData, error: mineError } = await window.supabase
    .from('marketplace_listings')
    .select('*, profile:user_id(username, display_name, country_code, phone, whatsapp)')
    .eq('user_id', userId)
    .eq('status', 'closed')
    .order('created_at', { ascending: false })
    .limit(100);

  if (mineError) throw mineError;

  const byId = new Map();
  [...(activeData || []), ...(mineClosedData || [])].forEach(item => {
    if (!item?.id) return;
    byId.set(item.id, item);
  });
  return Array.from(byId.values()).sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
}

async function createMarketplaceListing(userId, listing) {
  if (!window.supabase?.from) return { error: 'Sin conexión' };
  const { data, error } = await window.supabase.from('marketplace_listings').insert({
    user_id: userId,
    type: listing.type,
    cards: listing.cards || [],
    description: listing.description || '',
    location: listing.location || null,
    status: 'active',
  }).select('*, profile:user_id(username, display_name, country_code, phone, whatsapp)').single();
  if (!error) logActivity('listing', data?.id || '');
  return { data, error };
}

async function closeMarketplaceListing(listingId, userId) {
  if (!window.supabase?.from) return { error: 'Sin conexión' };
  let query = window.supabase.from('marketplace_listings')
    .update({ status: 'closed', updated_at: new Date() })
    .eq('id', listingId);
  if (userId) query = query.eq('user_id', userId);
  const { error } = await query;
  if (!error) logActivity('closed', listingId);
  return { error };
}

function normalizeIntlPhone(raw) {
  const digits = String(raw || '').replace(/\D/g, '');
  if (!digits) return '';
  if (digits.startsWith('00')) return digits.slice(2);
  return digits;
}

function isValidIntlPhone(raw) {
  const normalized = normalizeIntlPhone(raw);
  if (!normalized) return true;
  return normalized.length >= 10 && normalized.length <= 15;
}

async function checkProfileFieldAvailability(userId, field, rawValue) {
  if (!window.supabase?.from || !userId) return { available: true };

  let value = String(rawValue || '').trim();
  if (!value) return { available: true };

  if (field === 'username') {
    value = value.toLowerCase().replace(/\s+/g, '_').slice(0, 30);
  } else if (field === 'phone' || field === 'whatsapp') {
    value = normalizeIntlPhone(value);
    if (!isValidIntlPhone(value)) {
      return { available: false, message: 'Formato inválido. Usa 10-15 dígitos.' };
    }
  }

  const { data, error } = await window.supabase
    .from('profiles')
    .select('id')
    .eq(field, value)
    .neq('id', userId)
    .limit(1);

  if (error) return { available: true };
  if ((data || []).length === 0) return { available: true };

  if (field === 'username') return { available: false, message: 'Ese username ya está en uso.' };
  if (field === 'phone') return { available: false, message: 'Ese teléfono ya está en uso.' };
  if (field === 'whatsapp') return { available: false, message: 'Ese WhatsApp ya está en uso.' };
  return { available: false, message: 'Valor no disponible.' };
}

async function updateUserProfile(userId, patch = {}) {
  if (!window.supabase?.from || !userId) return { error: 'Sin conexión' };

  const username = String(patch.username || '').trim().toLowerCase().replace(/\s+/g, '_').slice(0, 30) || null;
  const phone = normalizeIntlPhone(patch.phone || '');
  const whatsapp = normalizeIntlPhone(patch.whatsapp || '');

  if (!isValidIntlPhone(phone) || !isValidIntlPhone(whatsapp)) {
    return { error: 'Formato inválido', message: 'Usa formato internacional de 10 a 15 dígitos (sin + ni espacios).' };
  }

  const checks = await Promise.all([
    checkProfileFieldAvailability(userId, 'username', username),
    checkProfileFieldAvailability(userId, 'phone', phone),
    checkProfileFieldAvailability(userId, 'whatsapp', whatsapp),
  ]);
  const firstConflict = checks.find(c => !c.available);
  if (firstConflict) return { error: 'conflict', message: firstConflict.message || 'Dato no disponible.' };

  const payload = {
    display_name: String(patch.name || '').trim() || null,
    username,
    phone: phone || null,
    whatsapp: whatsapp || null,
    ...(patch.country_code !== undefined && { country_code: patch.country_code || null }),
    updated_at: new Date(),
  };

  // Columnas opcionales: solo se incluyen si la tabla las tiene
  // (bio, location, updated_at se agregan vía migración SQL)
  if (patch.bio !== undefined) payload.bio = String(patch.bio || '').trim() || null;
  if (patch.location !== undefined) payload.location = String(patch.location || '').trim() || null;
  if (patch.avatar !== undefined) payload.avatar = String(patch.avatar || '').trim() || null;
  payload.updated_at = new Date().toISOString();

  const { data, error } = await window.supabase
    .from('profiles')
    .update(payload)
    .eq('id', userId)
    .select('*')
    .single();

  if (error) {
    const errMsg = String(error.message || '').toLowerCase();
    if (errMsg.includes('duplicate') || errMsg.includes('unique')) {
      return { error, message: 'Ese username o número ya está en uso.' };
    }
    if (errMsg.includes('column') && errMsg.includes('does not exist')) {
      // Reintentar sin las columnas opcionales que podrían no existir aún
      const safePayload = { display_name: payload.display_name, username: payload.username, phone: payload.phone, whatsapp: payload.whatsapp };
      const { data: d2, error: e2 } = await window.supabase
        .from('profiles').update(safePayload).eq('id', userId).select('*').single();
      if (e2) return { error: e2, message: 'No pudimos guardar el perfil.' };
      return { data: d2, error: null };
    }
    return { error, message: 'No pudimos guardar el perfil.' };
  }

  return { data, error: null };
}

function useSupabaseSession() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    if (!window.supabase?.auth) {
      setLoading(false);
      return;
    }
    window.supabase.auth.getSession()
      .then(({ data }) => {
        setSession(data.session);
        setLoading(false);
      })
      .catch(() => setLoading(false));
    const { data: { subscription } } = window.supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);
  return { session, loading };
}

  });
  const [collectionReady, setCollectionReady] = React.useState(false);
  React.useEffect(() => {

  const stats = computeStats(collection);

  React.useEffect(() => {
    if (!collectionReady) return;
    const prev = prevStatsRef.current;
    if (!prev) { prevStatsRef.current = stats; return; }
    const pct     = stats.total ? stats.have / stats.total : 0;
    const prevPct = stats.total ? prev.have  / stats.total : 0;
    if (prev.have === 0 && stats.have >= 1)          pushNotification('milestone_first',    '¡Marcaste tu primera estampa!');
    if (prevPct < 0.25  && pct >= 0.25)              pushNotification('milestone_pct25',    '¡Ya tienes el 25% del álbum!');
    if (prevPct < 0.5   && pct >= 0.5)               pushNotification('milestone_pct50',    '¡Vas a la mitad del álbum!');
    if (prevPct < 0.75  && pct >= 0.75)              pushNotification('milestone_pct75',    '¡Casi lo tienes! 75% completado');
    if (prevPct < 1     && pct >= 1)                 pushNotification('milestone_complete', '¡Álbum completo! Eres el mejor');
    if (prev.duplicates === 0 && stats.duplicates >= 1) pushNotification('duplicate_first', '¡Tienes tu primera repetida — úsala para intercambiar!');
    prevStatsRef.current = stats;
  }, [stats, collectionReady]);

  React.useEffect(() => {
    if (!collectionReady) return;
    const prevCol = prevCollectionRef.current;
    if (!prevCol) { prevCollectionRef.current = collection; return; }
    COUNTRIES.forEach(c => {
      const total = c.total || 20;
      const keys = Array.from({ length: total }, (_, i) => `${c.code}${String(i + 1).padStart(2, '0')}`);
      const wasComplete = keys.every(k => (prevCol[k] || 0) > 0);
      const isComplete  = keys.every(k => (collection[k] || 0) > 0);
      if (!wasComplete && isComplete) pushNotification('country_complete', `¡Completaste ${c.name || c.code}!`);
    });
    prevCollectionRef.current = collection;
  }, [collection, collectionReady]);

  React.useEffect(() => {
    if (!collectionReady) return;
    const prevAch = prevAchievementsRef.current;
    if (!prevAch) { prevAchievementsRef.current = achievements; return; }
    achievements.forEach(a => {
      const was = prevAch.find(p => p.id === a.id);
      if (a.unlocked && was && !was.unlocked) pushNotification('achievement', `Logro desbloqueado: ${a.label} ${a.desc}`);
    });
    prevAchievementsRef.current = achievements;
  }, [achievements, collectionReady]);

  React.useEffect(() => {
    const checkRecovery = () => {
      const hash = window.location.hash || '';
      setRecoveryMode(hash.includes('type=recovery'));
    };
    checkRecovery();
    window.addEventListener('hashchange', checkRecovery);
    return () => window.removeEventListener('hashchange', checkRecovery);
  }, []);

  React.useEffect(() => {
    if (loading) return;
    if (recoveryMode) {
      setScreen('reset');
      return;
    }
    if (!session) {
      setScreen('login');
      setUserData(null);
      return;
    }
    if (screen !== 'app') setScreen('app');
    if (!userData) {
      const user = session.user || {};
      setUserData({ id: user.id, email: user.email });
    }
  }, [loading, session, recoveryMode]);

  React.useEffect(() => {
    const onResize = () => setViewport({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  React.useEffect(() => {
    const onNavigate = (ev) => {
      const detail = ev?.detail || {};
      if (detail.nav === 'album') {
        setAlbumCountry(detail.countryCode || null);
      } else {
        setAlbumCountry(null);
      }
      if (detail.nav) setNav(detail.nav);
    };
    window.addEventListener('stickio:navigate', onNavigate);
    return () => window.removeEventListener('stickio:navigate', onNavigate);
  }, []);

  const isMobile = viewport.w < 820;

  const userId = session?.user?.id || userData?.id;

  React.useEffect(() => {
    if (window.setNotificationsUser) {
      window.setNotificationsUser(userId || null);
    }
    setNotifications(userId ? readNotifications(userId) : []);
  }, [userId]);

  React.useEffect(() => {
    if (!userId || !window.supabase?.from) {
      setCollectionReady(true);
      return;
    }
    setCollectionReady(false);
    window.supabase.from('collections')
      .select('sticker_id, quantity')
      .eq('user_id', userId)
      .then(({ data, error }) => {
        if (error || !data) {
          setCollectionReady(true);
          return;
        }
        const remote = {};
        data.forEach(r => { remote[r.sticker_id] = r.quantity; });
        let local = {};
        try { local = JSON.parse(localStorage.getItem('stickio_collection') || '{}'); } catch {}
        const merged = { ...local, ...remote };
        setCollection(merged);
        const toSync = Object.entries(local).filter(([id, qty]) => !remote[id] && qty > 0);
        if (toSync.length > 0) {
          const rows = toSync.map(([sticker_id, quantity]) => ({ user_id: userId, sticker_id, quantity, updated_at: new Date() }));
          window.supabase.from('collections').upsert(rows);
        }
        setCollectionReady(true);
      });
  }, [userId]);

  React.useEffect(() => {
    if (!userId || !window.supabase?.from) return;
    const authUser = session?.user || {};
    const meta = authUser.user_metadata || {};
    const emailPrefix = authUser.email ? authUser.email.split('@')[0] : null;
    const fallbackUsername = meta.username || emailPrefix || null;
    const fallbackName = meta.display_name || meta.username || emailPrefix || null;
    const fallbackCountry = COUNTRIES.find(c => c.code === meta.country_code) || null;
    window.supabase.from('profiles')
      .select('*')
      .eq('id', userId)
      .maybeSingle()
      .then(({ data, error }) => {
        if (error || !data) {
          setUserData(prev => ({
            ...prev,
            id: userId,
            email: authUser.email || prev?.email,
            username: prev?.username || fallbackUsername,
            name: prev?.name || fallbackName,
            country: prev?.country || fallbackCountry,
          }));
          return;
        }
        setUserData(prev => ({
          ...prev,
          id: data.id,
          email: data.email || authUser.email || prev?.email,
          username: data.username || fallbackUsername,
          name: data.display_name || data.username || fallbackName,
          country: COUNTRIES.find(c => c.code === data.country_code) || fallbackCountry,
          created_at: data.created_at || prev?.created_at || null,
          bio: data.bio || prev?.bio || '',
          location: data.location || prev?.location || '',
          phone: data.phone || prev?.phone || '',
          whatsapp: data.whatsapp || prev?.whatsapp || '',
          is_admin: !!data.is_admin,
        }));
      });
  }, [userId, session?.user]);

  const handleUpdateUser = async (patch) => {
    const nextLocal = prev => ({ ...prev, ...patch });
    if (!userId || !window.updateUserProfile) {
      setUserData(nextLocal);
      return { data: patch, error: null };
    }
    const { data, error, message } = await window.updateUserProfile(userId, patch);
    if (error || !data) return { error, message: message || 'No se pudo actualizar el perfil.' };

    setUserData(prev => ({
      ...prev,
      ...patch,
      id: data.id || prev?.id,
      username: data.username || patch.username || prev?.username,
      name: data.display_name || patch.name || prev?.name,
      bio: data.bio || '',
      location: data.location || '',
      phone: data.phone || '',
      whatsapp: data.whatsapp || '',
    }));
    return { data, error: null };
  };

  const [tradeOffers, setTradeOffers] = React.useState([]);

  React.useEffect(() => {
    if (!userId) { setTradeOffers([]); return; }
    fetchTradeOffers(userId).then(setTradeOffers);
  }, [userId]);

  React.useEffect(() => {
    if (!userId || !window.supabase?.channel) return;
    const ch = window.supabase
      .channel('trade_offers_realtime')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'trade_offers', filter: `to_user=eq.${userId}` },
        (payload) => {
          setTradeOffers(prev => [payload.new, ...prev]);
          pushNotification('achievement', '¡Tienes una nueva propuesta de intercambio!');
        }
      )
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'trade_offers' },
        (payload) => {
          setTradeOffers(prev => prev.map(o => o.id === payload.new.id ? { ...o, ...payload.new } : o));
        }
      )
      .subscribe();
    return () => window.supabase.removeChannel(ch);
  }, [userId]);

  const [marketplaceListings, setMarketplaceListings] = React.useState([]);
  const [marketplaceLoading, setMarketplaceLoading] = React.useState(false);
  const [marketplaceError, setMarketplaceError] = React.useState(null);

  const shouldKeepMarketplaceListing = React.useCallback((listing) => {
    if (!listing) return false;
    if (listing.status === 'active') return true;
    return !!userId && listing.user_id === userId;
  }, [userId]);

  const fetchMarketplaceListingById = React.useCallback(async (id) => {
    if (!id || !window.supabase?.from) return null;
    const { data } = await window.supabase
      .from('marketplace_listings')
      .select('*, profile:user_id(username, display_name, country_code, phone, whatsapp)')
      .eq('id', id)
      .maybeSingle();
    return data || null;
  }, []);

  React.useEffect(() => {
    setMarketplaceLoading(true);
    setMarketplaceError(null);
    fetchMarketplaceListings(userId)
      .then(data => { setMarketplaceListings(data); })
      .catch(() => { setMarketplaceError('No se pudieron cargar las publicaciones.'); })
      .finally(() => { setMarketplaceLoading(false); });
  }, [userId]);

  React.useEffect(() => {
    if (!window.supabase?.channel) return;
    const ch = window.supabase
      .channel('marketplace_realtime')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'marketplace_listings' },
        async (payload) => {
          const enriched = await fetchMarketplaceListingById(payload.new?.id);
          const nextItem = enriched || payload.new;
          if (!shouldKeepMarketplaceListing(nextItem)) return;
          setMarketplaceListings(prev => {
            const without = (prev || []).filter(l => l.id !== nextItem.id);
            return [nextItem, ...without];
          });
        }
      )
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'marketplace_listings' },
        async (payload) => {
          const enriched = await fetchMarketplaceListingById(payload.new?.id);
          const nextItem = enriched || payload.new;
          setMarketplaceListings(prev => {
            const list = prev || [];
            const exists = list.some(l => l.id === nextItem.id);
            if (!shouldKeepMarketplaceListing(nextItem)) {
              return list.filter(l => l.id !== nextItem.id);
            }
            if (!exists) return [nextItem, ...list];
            return list.map(l => l.id === nextItem.id ? { ...l, ...nextItem } : l);
          });
        }
      )
      .subscribe();
    return () => window.supabase.removeChannel(ch);
  }, [fetchMarketplaceListingById, shouldKeepMarketplaceListing]);

  const fetchAdminStats = async () => {
    if (!window.supabase?.rpc) return null;
    const { data, error } = await window.supabase.rpc('get_admin_stats');
    if (error) return null;
    return data;
  };

  const syncSticker = async (stickerId, quantity) => {
    if (quantity === 1) logActivity('add', stickerId);
    else if (quantity >= 2) logActivity('dup', stickerId);
    else if (quantity === 0) logActivity('remove', stickerId);
    setActivityLog(readActivityLog());
    if (!userId || !window.supabase?.from) return;
    if (quantity === 0) {
      await window.supabase.from('collections').delete()
        .eq('user_id', userId).eq('sticker_id', stickerId);
    } else {
      await window.supabase.from('collections')
        .upsert({ user_id: userId, sticker_id: stickerId, quantity, updated_at: new Date() });
    }
  };

  const {
    LoginDesktop, RegisterDesktop, ResetPasswordRequestDesktop, ResetPasswordDesktop,
    DashboardDesktop, AlbumDesktop, TradeDesktop, ProfileDesktop, AdminDesktop,
    LoginScreen, RegisterScreen, ResetPasswordRequestScreen, ResetPasswordScreen, DashboardScreen, AlbumScreen, TradeScreen, ProfileScreen,
    DESKTOP_W, DESKTOP_H,
    MOBILE_W, MOBILE_H,
  } = window;

  const handleLogin = () => {
    setScreen('app');
    if (pendingTradeUser) {
      setNav('trade');
    } else {
      setNav('home');
    }
  };
  const handleRegister = (data) => { setUserData(data); setScreen('app'); setNav('home'); };
  const handleNav = (id) => {
    setAlbumCountry(null);
    setNav(id);
  };
  const handleNavToCountry = (countryCode) => {
    setAlbumCountry(countryCode || null);
    setNav('album');
  };
  const handleToggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    window.applyTheme(next);
    window.__theme = next;
    document.body.style.background = window.SK.bg;
    setTheme(next);
  };

  const ScaledAuth = ({ children }) => (
    <div style={{ width: '100vw', height: '100vh', background: window.SK.bg, overflow: 'hidden', position: 'relative' }}>
      <div style={{
        transform: `scale(${Math.min(window.innerWidth / DESKTOP_W, window.innerHeight / DESKTOP_H)})`,
        transformOrigin: 'top left',
        position: 'absolute', top: 0, left: 0,
      }}>{children}</div>
    </div>
  );

  if (screen === 'login') {
    return isMobile
      ? <ScaledMobile><LoginScreen onLogin={handleLogin} onRegister={() => setScreen('register')} onForgot={() => setScreen('reset-request')}/></ScaledMobile>
      : <ScaledAuth><LoginDesktop onLogin={handleLogin} onRegister={() => setScreen('register')} onForgot={() => setScreen('reset-request')}/></ScaledAuth>;
  }
  if (screen === 'register') {
    return isMobile
      ? <ScaledMobile><RegisterScreen onRegister={handleRegister} onLogin={() => setScreen('login')}/></ScaledMobile>
      : <ScaledAuth><RegisterDesktop onRegister={handleRegister} onLogin={() => setScreen('login')}/></ScaledAuth>;
  }
  if (screen === 'reset-request') {
    return isMobile
      ? <ScaledMobile><ResetPasswordRequestScreen onBack={() => setScreen('login')}/></ScaledMobile>
      : <ScaledAuth><ResetPasswordRequestDesktop onBack={() => setScreen('login')}/></ScaledAuth>;
  }
  if (screen === 'reset') {
    const done = async () => {
      if (window.supabase?.auth) await window.supabase.auth.signOut();
      window.history.replaceState(null, '', window.location.pathname);
      setScreen('login');
    };
    return isMobile
      ? <ScaledMobile><ResetPasswordScreen onDone={done}/></ScaledMobile>
      : <ScaledAuth><ResetPasswordDesktop onDone={done}/></ScaledAuth>;
  }

  const renderScreen = () => {
    if (isMobile) {
      switch (nav) {
        case 'home':        return <DashboardScreen onNav={handleNav} onNavToCountry={handleNavToCountry} stats={stats} collection={collection} activityLog={activityLog} userId={userId} notifications={notifications}/>;
        case 'album':       return <AlbumScreen onNav={handleNav} initialCountry={albumCountry} collection={collection} setCollection={setCollection} onStickerChange={syncSticker}/>;
        case 'trade':       return <TradeScreen onNav={handleNav} collection={collection} userData={userData} notifications={notifications} tradeOffers={tradeOffers} onTradeOffersChange={setTradeOffers} userId={userId} tradeUser={pendingTradeUser} onTradeUserConsumed={() => { setPendingTradeUser(null); try { sessionStorage.removeItem('stickio_pending_trade'); window.history.replaceState(null, '', window.location.pathname); } catch {} }}/>
        case 'marketplace': return <MarketplaceScreen onNav={handleNav} userData={userData} collection={collection} notifications={notifications} marketplaceListings={marketplaceListings} onMarketplaceListingsChange={setMarketplaceListings} userId={userId} marketplaceLoading={marketplaceLoading} marketplaceError={marketplaceError}/>;
        case 'profile':     return <ProfileScreen onNav={handleNav} stats={stats} achievements={achievements} userData={userData} onUpdateUser={handleUpdateUser} notifications={notifications} tradeOffers={tradeOffers} userId={userId} collection={collection} activityLog={activityLog}/>;
        default:        return <DashboardScreen onNav={handleNav} onNavToCountry={handleNavToCountry} stats={stats} collection={collection} activityLog={activityLog} userId={userId} notifications={notifications}/>;
      }
    }
    switch (nav) {
      case 'home':        return <DashboardDesktop onNav={handleNav} onNavToCountry={handleNavToCountry} stats={stats} collection={collection} activityLog={activityLog} theme={theme} onToggleTheme={handleToggleTheme} userData={userData} notifications={notifications}/>;
      case 'album':       return <AlbumDesktop onNav={handleNav} initialCountry={albumCountry} theme={theme} onToggleTheme={handleToggleTheme} collection={collection} setCollection={setCollection} onStickerChange={syncSticker} userData={userData} stats={stats} notifications={notifications}/>;
      case 'trade':       return <TradeDesktop onNav={handleNav} theme={theme} onToggleTheme={handleToggleTheme} collection={collection} userData={userData} stats={stats} notifications={notifications} tradeOffers={tradeOffers} onTradeOffersChange={setTradeOffers} userId={userId} tradeUser={pendingTradeUser} onTradeUserConsumed={() => { setPendingTradeUser(null); try { sessionStorage.removeItem('stickio_pending_trade'); window.history.replaceState(null, '', window.location.pathname); } catch {} }}/>;
      case 'marketplace': return <MarketplaceDesktop onNav={handleNav} userData={userData} theme={theme} onToggleTheme={handleToggleTheme} collection={collection} stats={stats} notifications={notifications} marketplaceListings={marketplaceListings} onMarketplaceListingsChange={setMarketplaceListings} userId={userId} marketplaceLoading={marketplaceLoading} marketplaceError={marketplaceError}/>;
      case 'profile':     return <ProfileDesktop onNav={handleNav} stats={stats} achievements={achievements} userData={userData} theme={theme} onToggleTheme={handleToggleTheme} onUpdateUser={handleUpdateUser} collection={collection} activityLog={activityLog} notifications={notifications} tradeOffers={tradeOffers} userId={userId}/>;
      case 'admin':       return <AdminDesktop onNav={handleNav} userData={userData} theme={theme} onToggleTheme={handleToggleTheme} fetchStats={fetchAdminStats} stats={stats} notifications={notifications}/>;
      default:        return <DashboardDesktop onNav={handleNav} onNavToCountry={handleNavToCountry} stats={stats} collection={collection} activityLog={activityLog} theme={theme} onToggleTheme={handleToggleTheme} userData={userData} notifications={notifications}/>;
    }
  };

  return isMobile ? (
    <ScaledMobile>{renderScreen()}</ScaledMobile>
  ) : (
    <div style={{
      width: '100vw', height: '100vh',
      overflow: 'hidden',
      display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-start',
    }}>
      <ScaledDesktop width={DESKTOP_W} height={DESKTOP_H}>
        {renderScreen()}
      </ScaledDesktop>
    </div>
  );
}

function ScaledMobile({ children }) {
  const measure = () => {
    const vw = window.innerWidth;
    const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    return Math.min(vw / MOBILE_W, vh / MOBILE_H);
  };
  const [scale, setScale] = React.useState(measure);
  React.useEffect(() => {
    let lastW = window.innerWidth;
    const update = () => setScale(measure());
    const onResize = () => {
      // Ignore address-bar hide/show (only height changes) to avoid layout jumps.
      if (window.innerWidth !== lastW) {
        lastW = window.innerWidth;
        update();
      }
    };
    const onOrientation = () => setTimeout(update, 150);
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onOrientation);
    return () => {
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onOrientation);
    };
  }, []);
  return (
    <div style={{
      width: '100vw',
      height: '100svh',
      minHeight: '-webkit-fill-available',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
      background: window.SK.bg,
    }}>
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
        width: MOBILE_W, height: MOBILE_H,
        flexShrink: 0,
      }}>
        {children}
      </div>
    </div>
  );
}

function ScaledDesktop({ width, height, children }) {
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const update = () => {
      const scaleX = window.innerWidth / width;
      const scaleY = window.innerHeight / height;
      setScale(Math.min(scaleX, scaleY));
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [width, height]);

  return (
    <div style={{
      width: '100vw', height: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      <div style={{
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
        width, height,
        flexShrink: 0,
      }}>
        {children}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
